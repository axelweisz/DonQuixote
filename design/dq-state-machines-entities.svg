<svg width="100%" viewBox="0 0 680 1320" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Don Quixote — state machines for all entities</title>
<desc>State machine diagrams for WindmillEntity, Quixote Action, Quixote Perception, Sancho Action, Sancho Behaviour, Rocinante, and Rucio.</desc>
<defs>
